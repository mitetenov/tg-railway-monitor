# ── Telegram Ticket Monitor — Docker Compose ─────────────────────
# Pull & start:  docker compose pull && docker compose up -d
# Stop:          docker compose down
# Logs:          docker compose logs -f

services:
  bot:
    image: mitetenov/tg-ticket-monitor:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persist per-chat JSON configs and monitor state across restarts
      - data:/app/data
    container_name: tg-ticket-monitor

volumes:
  data:
