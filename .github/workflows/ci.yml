name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-mock
      - name: Run tests
        run: pytest -v
      - name: Check syntax
        run: python -m compileall -q . -x '.venv|__pycache__|tests'
